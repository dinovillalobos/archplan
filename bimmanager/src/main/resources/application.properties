spring.application.name=bimmanager

# Puerto donde correrá tu servidor Java
server.port=8080

# Configuración de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/bim_manager_db
spring.datasource.username=${DB_USER:rdb_admin}
spring.datasource.password=${DB_PASSWORD:g0wr07db}
# Hibernate (JPA) para que cree las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- NUEVOS LÍMITES PARA SUBIR EVIDENCIAS (10 Megabytes) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
